<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Não sei o nome - Painel do Professor</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/modal.css">
</head>
<body class="bg-dashboard">

    <section id="teacher-dashboard" class="dashboard-layout">
        <header class="dashboard-header">
            <div class="logo-area">
                <span class="logo-icon">♦️</span>
                <h2 class="app-title-small">Não sei o nome</h2>
            </div>
            <div class="header-actions">
                <button class="join-class-btn" title="Criar uma turma" onclick="openCreateModal()">+</button>
                <div class="avatar-placeholder" style="background-color: var(--color-red);">P</div>
            </div>
        </header>

        <main class="dashboard-content">
            <div class="class-grid">
                <div class="class-card theme-red">
                    <div class="class-card-header">
                        <h3>Lógica e Robótica - 6º Ano A</h3>
                        <p>Escola Municipal Esperança</p>
                    </div>
                    <div class="class-card-body">
                        <p><strong>Código da turma:</strong> X7Y-99Z</p>
                        <p style="margin-top: 10px; font-size: 0.85rem; color: #888;">32 Alunos matriculados</p>
                    </div>
                </div>
            </div>
        </main>

        <div id="create-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Criar turma</h3>
                    <button class="close-btn" onclick="closeCreateModal()">&times;</button>
                </div>
                
                <div class="modal-body">
                    <div class="code-box">
                        <div class="input-group">
                            <label for="new-class-name">Nome da turma (obrigatório)</label>
                            <input type="text" id="new-class-name" placeholder="Ex: Lógica 6º Ano" oninput="validateCreateInput()">
                        </div>
                        <div class="input-group" style="margin-top: 15px;">
                            <label for="new-class-school">Escola / Instituição</label>
                            <input type="text" id="new-class-school" placeholder="Ex: Escola Municipal Esperança">
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button class="cancel-btn" onclick="closeCreateModal()">Cancelar</button>
                    <button id="submit-create-btn" class="join-btn disabled" disabled style="background-color: #cccccc;">Criar</button>
                </div>
            </div>
        </div>
    </section>

    <script src="../js/teacher.js"></script>
</body>
</html>
